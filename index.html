<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

  <link href="dist/styles.css" rel="stylesheet" />
  <link href="src/style2.css" rel="stylesheet" />

  <title>BRAMSS</title>
</head>

<body>

  <!-- Top things to do -->
  <section class="mt-16">
    <div class="max-w-6xl mx-auto px-6">

      <!-- Title -->
      <h2 class="font-bold mb-6 text-lg sm:text-xl md:text-2xl lg:text-3xl text-[#1B263B]">
        أماكن يمكنك زيارتها
      </h2>

      <!-- Tabs -->
      <div class="flex flex-wrap gap-3 mb-8 filter-button-group">

        <button data-filter="*" class="filter-btn active border border-[#1B263B] text-[#FFFDF9] bg-[#1B263B] px-4 py-2 rounded-full text-xs">
          الكل
        </button>

        <button data-filter=".beach" class="filter-btn border border-[#1B263B] text-[#1B263B] px-4 py-2 rounded-full text-xs">
          <i class="fa-solid fa-umbrella-beach"></i>
          شواطئ
        </button>

        <button data-filter=".museum" class="filter-btn border border-[#1B263B] text-[#1B263B] px-4 py-2 rounded-full text-xs">
          <i class="fa-solid fa-building-columns"></i>
          متاحف
        </button>

        <button data-filter=".garden" class="filter-btn border border-[#1B263B] text-[#1B263B] px-4 py-2 rounded-full text-xs">
          <i class="fa-solid fa-children"></i>
          حدائق
        </button>

        <button data-filter=".food" class="filter-btn border border-[#1B263B] text-[#1B263B] px-4 py-2 rounded-full text-xs">
          <i class="fa-solid fa-utensils"></i>
          مطاعم
        </button>

        <button data-filter=".hotel" class="filter-btn border border-[#1B263B] text-[#1B263B] px-4 py-2 rounded-full text-xs">
          <i class="fa-solid fa-hotel"></i>
          فنادق
        </button>

      </div>

      <!-- Cards -->
      <div class="cardsContainer grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">

        <div class="p-2 beach">
          <img src="dist/img/home/top things to do/beach1.jpg" class="w-full aspect-[3/2] object-cover rounded-xl" />
          <p class="mt-2 text-xs text-center">شاطئ زالا</p>
        </div>

        <div class="p-2 beach">
          <img src="dist/img/home/top things to do/beach2.jpg" class="w-full aspect-[3/2] object-cover rounded-xl" />
          <p class="mt-2 text-xs text-center">شاطئ بونتا راتا</p>
        </div>

        <div class="p-2 museum">
          <img src="dist/img/home/top things to do/museum1.jpg" class="w-full aspect-[3/2] object-cover rounded-xl" />
          <p class="mt-2 text-xs text-center">السيف الدمشقي</p>
        </div>

        <div class="p-2 museum">
          <img src="dist/img/home/top things to do/museum2.jpg" class="w-full aspect-[3/2] object-cover rounded-xl" />
          <p class="mt-2 text-xs text-center">الجامع الأموي</p>
        </div>

        <div class="p-2 garden">
          <img src="dist/img/home/top things to do/garden1.jpg" class="w-full aspect-[3/2] object-cover rounded-xl" />
          <p class="mt-2 text-xs text-center">حديقة كلاسيكية</p>
        </div>

        <div class="p-2 garden">
          <img src="dist/img/home/top things to do/garden2.jpg" class="w-full aspect-[3/2] object-cover rounded-xl" />
          <p class="mt-2 text-xs text-center">حديقة باجاتيل</p>
        </div>

        <div class="p-2 food">
          <img src="dist/img/home/top things to do/food1.jpg" class="w-full aspect-[3/2] object-cover rounded-xl" />
          <p class="mt-2 text-xs text-center">مطعم راقٍ</p>
        </div>

        <div class="p-2 food">
          <img src="dist/img/home/top things to do/food2.jpg" class="w-full aspect-[3/2] object-cover rounded-xl" />
          <p class="mt-2 text-xs text-center">مطعم كلاسيكي</p>
        </div>

        <div class="p-2 hotel">
          <img src="dist/img/home/top things to do/hotel1.jpg" class="w-full aspect-[3/2] object-cover rounded-xl" />
          <p class="mt-2 text-xs text-center">فندق جوليا دومنا</p>
        </div>

        <div class="p-2 hotel">
          <img src="dist/img/home/top things to do/hotel2.jpg" class="w-full aspect-[3/2] object-cover rounded-xl" />
          <p class="mt-2 text-xs text-center">فندق تاليسمان</p>
        </div>

      </div>

    </div>
  </section>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.js"></script>

  <script>
    var $Things = $('.cardsContainer').isotope({
      layoutMode: 'fitRows',
      originLeft: false
    });

    $('.filter-button-group').on('click', 'button', function () {
      $('.filter-btn').removeClass('active');
      $(this).addClass('active');
      var filterValue = $(this).attr('data-filter');
      $Things.isotope({ filter: filterValue });
    });
  </script>

</body>
</html>
